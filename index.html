<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF Outstanding Units Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #263347;
    --border: #334155;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --accent: #38bdf8;
    --green: #4ade80;
    --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; }
  header { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 17px; font-weight: 700; color: var(--accent); }
  header span { color: var(--text2); font-size: 12px; }
  .tabs-nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; padding: 0 16px; overflow-x: auto; }
  .tab-btn { padding: 12px 20px; background: none; border: none; border-bottom: 3px solid transparent; color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; transition: all 0.15s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; padding: 20px 24px; }
  .tab-panel.active { display: block; }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
  .section-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::before { content: ""; display: inline-block; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }
  .controls { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .btn-group { display: flex; gap: 3px; background: var(--bg); border-radius: 6px; padding: 3px; }
  .tf-btn, .scale-btn { padding: 4px 10px; border-radius: 4px; border: none; background: none; color: var(--text2); cursor: pointer; font-size: 11px; font-weight: 500; transition: all 0.12s; }
  .tf-btn:hover, .scale-btn:hover { color: var(--text); background: var(--surface2); }
  .tf-btn.active, .scale-btn.active { background: var(--accent); color: #0f172a; font-weight: 700; }
  .divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .chart-wrap { position: relative; height: 320px; }
  .chart-wrap-sm { position: relative; height: 200px; }
  .perf-table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { color: var(--text2); font-weight: 600; padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
  th:first-child { text-align: left; }
  th:hover { color: var(--text); }
  th.sort-asc, th.sort-desc { color: var(--accent); }
  th.sort-asc::after { content: " ▲"; font-size: 9px; }
  th.sort-desc::after { content: " ▼"; font-size: 9px; }
  td { padding: 7px 10px; text-align: right; border-bottom: 1px solid rgba(51,65,85,0.5); white-space: nowrap; }
  td:first-child { text-align: left; color: var(--text); font-weight: 500; }
  tr:hover td { background: var(--surface2); }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neu { color: var(--text2); }
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 14px; }
  .chart-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .chart-card-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .expand-btn { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text2); cursor: pointer; padding: 2px 6px; font-size: 11px; line-height: 1.4; transition: all 0.12s; }
  .expand-btn:hover { color: var(--accent); border-color: var(--accent); }
  /* Single-chart full-page mode */
  .single-mode header { position: static; }
  .single-mode .single-wrap { padding: 20px 24px; }
  .single-mode .single-chart-wrap { position: relative; height: calc(100vh - 220px); min-height: 400px; }
  .chart-card-controls { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
  .chart-card-controls .tf-btn, .chart-card-controls .scale-btn { font-size: 10px; padding: 3px 7px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); cursor: pointer; }
  .legend-item:hover { color: var(--text); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

function parseDateStr(s){ return new Date(s+'T00:00:00'); }

function getStartDate(tf){
  const last = parseDateStr(LAST_DATE);
  const y=last.getFullYear(), m=last.getMonth(), d=last.getDate();
  switch(tf){
    case '1W':  return new Date(y,m,d-7);
    case '1M':  return new Date(y,m-1,d);
    case '3M':  return new Date(y,m-3,d);
    case '6M':  return new Date(y,m-6,d);
    case 'YTD': return new Date(y,0,1);
    case '1Y':  return new Date(y-1,m,d);
    case '3Y':  return new Date(y-3,m,d);
    case '7Y':  return new Date(y-7,m,d);
    default:    return parseDateStr(DATES[0]);
  }
}

function getDateRange(tf){
  const start = getStartDate(tf);
  const idxs = [];
  for(let i=0;i<DATES.length;i++) if(parseDateStr(DATES[i])>=start) idxs.push(i);
  return idxs.length>0 ? idxs : [0,DATES.length-1];
}

function findClosestIdx(targetStr){
  let lo=0, hi=DATES.length-1;
  while(lo<hi){ const mid=(lo+hi)>>1; if(DATES[mid]<targetStr) lo=mid+1; else hi=mid; }
  if(lo>0 && Math.abs(parseDateStr(DATES[lo-1])-parseDateStr(targetStr)) < Math.abs(parseDateStr(DATES[lo])-parseDateStr(targetStr))) return lo-1;
  return lo;
}

function getSlice(ticker, idxs, scale){
  const vals = RAW.etfs[ticker];
  if(!vals) return [];
  const slice = idxs.map(i=>vals[i]);
  if(scale==='rebase'){
    let base=null;
    for(const v of slice){ if(v!==null&&v>0){base=v;break;} }
    if(base===null) return slice.map(()=>null);
    return slice.map(v=>v!==null ? Math.round(v/base*10000)/100 : null);
  }
  return slice;
}

function calcPerf(ticker, tf){
  const vals = RAW.etfs[ticker];
  if(!vals) return null;
  let latestVal=null;
  for(let i=vals.length-1;i>=0;i--){ if(vals[i]!==null){latestVal=vals[i];break;} }
  if(latestVal===null) return null;
  if(tf==='Max'){
    for(let i=0;i<vals.length;i++) if(vals[i]!==null) return (latestVal-vals[i])/vals[i]*100;
    return null;
  }
  const startStr = getStartDate(tf).toISOString().slice(0,10);
  const idx = findClosestIdx(startStr);
  let startVal=null;
  for(let d=0;d<=5;d++){
    if(idx+d<vals.length&&vals[idx+d]!==null){startVal=vals[idx+d];break;}
    if(idx-d>=0&&vals[idx-d]!==null){startVal=vals[idx-d];break;}
  }
  if(!startVal||startVal===0) return null;
  return (latestVal-startVal)/startVal*100;
}

function getLatestVal(ticker){
  const vals=RAW.etfs[ticker];
  if(!vals) return null;
  for(let i=vals.length-1;i>=0;i--) if(vals[i]!==null) return vals[i];
  return null;
}

function fmtPerf(v){
  if(v===null) return {text:'—',cls:'neu'};
  const t=(v>=0?'+':'')+v.toFixed(2)+'%';
  return {text:t, cls:v>0?'pos':v<0?'neg':'neu'};
}

function fmtVal(v){
  if(v===null) return '—';
  if(v>=1000) return (v/1000).toFixed(2)+'K';
  return v.toFixed(2);
}

function makeDataset(ticker,idx,vals,label){
  const color=COLORS[idx%COLORS.length];
  return { label:label||RAW.names[ticker]||ticker, data:vals, borderColor:color, backgroundColor:color+'18', borderWidth:1.5, pointRadius:0, pointHoverRadius:4, tension:0.1, fill:false, spanGaps:true };
}

function chartConfig(labels,datasets){
  return {
    type:'line', data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1e293b', borderColor:'#334155', borderWidth:1,
          titleColor:'#38bdf8', bodyColor:'#e2e8f0', padding:10,
          callbacks:{ label:ctx=>{ const v=ctx.parsed.y; return ` ${ctx.dataset.label}: ${v!==null?v.toLocaleString(undefined,{maximumFractionDigits:2}):'—'}`; } }
        }
      },
      scales:{
        x:{ grid:{color:'rgba(51,65,85,0.4)'}, ticks:{maxTicksLimit:8,maxRotation:45,minRotation:0,callback:function(val){ const l=this.getLabelForValue(val); return l?l.slice(0,10):''; }} },
        y:{ grid:{color:'rgba(51,65,85,0.4)'}, position:'right', ticks:{callback:v=>v>=1000?(v/1000).toFixed(1)+'K':v.toFixed(1)} }
      }
    }
  };
}

function renderCombinedChart(tabId,tickers,tf,scale){
  const key=`combined_${tabId}`;
  if(chartInstances[key]) chartInstances[key].destroy();
  const idxs=getDateRange(tf);
  const labels=idxs.map(i=>DATES[i]);
  const datasets=tickers.map((t,i)=>makeDataset(t,i,getSlice(t,idxs,scale)));
  const canvas=document.getElementById(`chart_${tabId}`);
  if(!canvas) return;
  chartInstances[key]=new Chart(canvas.getContext('2d'),chartConfig(labels,datasets));
  const legendEl=document.getElementById(`legend_${tabId}`);
  if(legendEl) legendEl.innerHTML=datasets.map((ds,i)=>`<span class="legend-item" onclick="toggleDataset('combined_${tabId}',${i})"><span class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></span><span>${ds.label}</span></span>`).join('');
}

function toggleDataset(chartKey,dsIdx){
  const ch=chartInstances[chartKey];
  if(!ch) return;
  const meta=ch.getDatasetMeta(dsIdx);
  meta.hidden=!meta.hidden;
  ch.update();
}

const tableSortState = {};

function renderPerfTable(tabId, tickers, sortCol, sortDir){
  const tbody = document.getElementById(`table_${tabId}`);
  if(!tbody) return;

  // Build row data
  const cols = ['name', 'latest', ...TF_LABELS];
  let rows = tickers.map(t => {
    const perfs = TF_LABELS.map(p => calcPerf(t, p));
    return { ticker: t, name: RAW.names[t]||t, latest: getLatestVal(t), perfs };
  });

  // Sort
  if(sortCol !== undefined && sortCol !== null) {
    rows.sort((a, b) => {
      let av, bv;
      if(sortCol === 0) { av = a.name; bv = b.name; return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av); }
      if(sortCol === 1) { av = a.latest ?? -Infinity; bv = b.latest ?? -Infinity; }
      else { av = a.perfs[sortCol-2] ?? -Infinity; bv = b.perfs[sortCol-2] ?? -Infinity; }
      return sortDir === 'asc' ? av - bv : bv - av;
    });
  }

  tbody.innerHTML = rows.map(r => {
    const lat = fmtVal(r.latest);
    const cells = r.perfs.map(v => { const f = fmtPerf(v); return `<td class="${f.cls}">${f.text}</td>`; }).join('');
    return `<tr><td>${r.name}</td><td class="neu">${lat}</td>${cells}</tr>`;
  }).join('');

  // Update header sort indicators
  const thead = tbody.closest('table').querySelector('thead tr');
  if(thead) {
    [...thead.querySelectorAll('th')].forEach((th, i) => {
      th.classList.remove('sort-asc','sort-desc');
      if(i === sortCol) th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    });
  }
}

function calcMA(values, period) {
  return values.map((_, i) => {
    if (i < period - 1) return null;
    const window = values.slice(i - period + 1, i + 1);
    if (window.some(v => v === null)) return null;
    return Math.round(window.reduce((a, b) => a + b, 0) / period * 100) / 100;
  });
}

function renderIndividualChart(ticker, canvasId, tf, scale, showMA5, showMA10, showMA20){
  const key = `ind_${canvasId}`;
  if(chartInstances[key]) chartInstances[key].destroy();

  // Get full data to compute MA from a wider window, then slice
  const allVals = RAW.etfs[ticker] || [];
  const allIdxs = getDateRange(tf);

  // To compute accurate MAs at the start of the window, look back up to 10 extra points
  const startIdx = allIdxs[0];
  const lookback = Math.max(0, startIdx - 10);
  const extIdxs = [];
  for(let i = lookback; i <= allIdxs[allIdxs.length-1]; i++) extIdxs.push(i);

  // Get raw values over extended range
  let extVals = extIdxs.map(i => allVals[i] ?? null);

  // Rebase if needed — rebase to the start of the actual window
  if(scale === 'rebase') {
    const baseIdx = allIdxs[0] - lookback;
    let base = null;
    for(let i = baseIdx; i < extVals.length; i++) { if(extVals[i] !== null && extVals[i] > 0) { base = extVals[i]; break; } }
    if(base !== null) extVals = extVals.map(v => v !== null ? Math.round(v / base * 10000) / 100 : null);
  }

  const ma5All  = calcMA(extVals, 5);
  const ma10All = calcMA(extVals, 10);
  const ma20All = calcMA(extVals, 20);

  // Trim back to the actual window
  const trimStart = allIdxs[0] - lookback;
  const labels  = allIdxs.map(i => DATES[i]);
  const vals    = allIdxs.map(i => extVals[i - lookback]);
  const ma5     = allIdxs.map(i => ma5All[i - lookback]);
  const ma20    = allIdxs.map(i => ma20All[i - lookback]);
  const ma10    = allIdxs.map(i => ma10All[i - lookback]);

  const ds = makeDataset(ticker, 0, vals, RAW.names[ticker]||ticker);
  ds.fill = true;

  const datasets = [ds];
  if(showMA5  !== false) datasets.push({ label:'MA5',  data:ma5,  borderColor:'#94a3b8', backgroundColor:'transparent', borderWidth:1.5, borderDash:[4,2], pointRadius:0, tension:0.1, spanGaps:true });
  if(showMA10 !== false) datasets.push({ label:'MA10', data:ma10, borderColor:'#facc15', backgroundColor:'transparent', borderWidth:1.5, borderDash:[6,3], pointRadius:0, tension:0.1, spanGaps:true });
  if(showMA20 !== false) datasets.push({ label:'MA20', data:ma20, borderColor:'#f87171', backgroundColor:'transparent', borderWidth:1.5, borderDash:[8,4], pointRadius:0, tension:0.1, spanGaps:true });

  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  chartInstances[key] = new Chart(canvas.getContext('2d'), chartConfig(labels, datasets));
}

function renderTab(tabId){
  if(renderedTabs[tabId]) return;
  renderedTabs[tabId]=true;
  const cfg=TABS_CONFIG[tabId];
  const tickers=cfg.tickers;
  const panel=document.getElementById(tabId);
  let html='';
  html+=`<div class="section"><div class="section-title">Combined Trend</div>
    <div class="controls">
      <div class="btn-group">${TF_LABELS.map(tf=>`<button class="tf-btn ${tf==='1Y'?'active':''}" onclick="updateCombined('${tabId}','${tf}',this)">${tf}</button>`).join('')}</div>
      <div class="divider"></div>
      <div class="btn-group">
        <button class="scale-btn active" onclick="updateCombinedScale('${tabId}','rebase',this)">Rebase 100</button>
        <button class="scale-btn" onclick="updateCombinedScale('${tabId}','units',this)">Units</button>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="chart_${tabId}"></canvas></div>
    <div class="legend" id="legend_${tabId}"></div>
  </div>`;
  html+=`<div class="section"><div class="section-title">Performance Summary</div>
    <div class="perf-table-wrap"><table>
      <thead><tr>
        ${['ETF','Latest (mn units)',...TF_LABELS].map((h,i)=>`<th onclick="sortPerfTable('${tabId}',${i})">${h}</th>`).join('')}
      </tr></thead>
      <tbody id="table_${tabId}"></tbody>
    </table></div>
  </div>`;
  html+=`<div class="section"><div class="section-title">Individual Charts</div><div class="charts-grid">`;
  tickers.forEach(ticker=>{
    const cid=`ic_${tabId}_${ticker.replace(/[^a-zA-Z0-9]/g,'_')}`;
    html+=`<div class="chart-card">
      <div class="chart-card-title"><span>${RAW.names[ticker]||ticker}</span><button class="expand-btn" onclick="openSingle('${ticker}')" title="Open full page">&#x26F6;</button></div>
      <div class="chart-card-controls">
        <div class="btn-group">${TF_LABELS.map(tf=>`<button class="tf-btn ${tf==='1Y'?'active':''}" onclick="updateIndChart('${ticker}','${cid}','${tf}',this)">${tf}</button>`).join('')}</div>
        <div class="divider"></div>
        <div class="btn-group">
          <button class="scale-btn active" onclick="updateIndScale('${ticker}','${cid}','rebase',this)">R100</button>
          <button class="scale-btn" onclick="updateIndScale('${ticker}','${cid}','units',this)">Units</button>
        </div>
        <div class="divider"></div>
        <div class="btn-group">
          <button class="scale-btn active" id="ma5_${cid}" onclick="toggleMA('${ticker}','${cid}','ma5',this)" style="color:#94a3b8">MA5</button>
          <button class="scale-btn active" id="ma10_${cid}" onclick="toggleMA('${ticker}','${cid}','ma10',this)" style="color:#facc15">MA10</button>
          <button class="scale-btn active" id="ma20_${cid}" onclick="toggleMA('${ticker}','${cid}','ma20',this)" style="color:#f87171">MA20</button>
        </div>
      </div>
      <div class="chart-wrap-sm"><canvas id="${cid}"></canvas></div>
    </div>`;
  });
  html+=`</div></div>`;
  panel.innerHTML=html;
  requestAnimationFrame(()=>{
    renderCombinedChart(tabId,tickers,'1Y','rebase');
    renderPerfTable(tabId,tickers);
    tickers.forEach(ticker=>{
      const cid=`ic_${tabId}_${ticker.replace(/[^a-zA-Z0-9]/g,'_')}`;
      renderIndividualChart(ticker,cid,'1Y','rebase',true,true,true);
    });
  });
}

const combState={};
Object.keys(TABS_CONFIG).forEach(id=>{combState[id]={tf:'1Y',scale:'rebase'};});

function updateCombined(tabId,tf,btn){
  combState[tabId].tf=tf;
  btn.closest('.btn-group').querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCombinedChart(tabId,TABS_CONFIG[tabId].tickers,tf,combState[tabId].scale);
}

function updateCombinedScale(tabId,scale,btn){
  combState[tabId].scale=scale;
  btn.closest('.btn-group').querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCombinedChart(tabId,TABS_CONFIG[tabId].tickers,combState[tabId].tf,scale);
}

const indState={};
function getIndState(k){ if(!indState[k]) indState[k]={tf:'1Y',scale:'rebase',ma5:true,ma10:true,ma20:true}; return indState[k]; }

function updateIndChart(ticker,cid,tf,btn){
  const s=getIndState(ticker+'_'+cid); s.tf=tf;
  btn.closest('.btn-group').querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderIndividualChart(ticker,cid,s.tf,s.scale,s.ma5,s.ma10,s.ma20);
}

function updateIndScale(ticker,cid,scale,btn){
  const s=getIndState(ticker+'_'+cid); s.scale=scale;
  btn.closest('.btn-group').querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderIndividualChart(ticker,cid,s.tf,s.scale,s.ma5,s.ma10,s.ma20);
}

function toggleMA(ticker,cid,maKey,btn){
  const s=getIndState(ticker+'_'+cid);
  s[maKey]=!s[maKey];
  btn.classList.toggle('active', s[maKey]);
  renderIndividualChart(ticker,cid,s.tf,s.scale,s.ma5,s.ma10,s.ma20);
}

function sortPerfTable(tabId, colIdx){
  const state = tableSortState[tabId] || { col: null, dir: 'desc' };
  const newDir = (state.col === colIdx && state.dir === 'desc') ? 'asc' : 'desc';
  tableSortState[tabId] = { col: colIdx, dir: newDir };
  renderPerfTable(tabId, TABS_CONFIG[tabId].tickers, colIdx, newDir);
}

function switchTab(tabId,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  renderTab(tabId);
}

function openSingle(ticker) {
  const url = location.pathname + '?single=' + encodeURIComponent(ticker);
  window.open(url, '_blank');
}

// ── Single-chart full-page mode ──────────────────────────────────────────────
function renderSinglePage(ticker) {
  document.body.classList.add('single-mode');
  const name = RAW.names[ticker] || ticker;

  // Replace entire body content
  document.querySelector('header h1').textContent = name;
  document.querySelector('header span').textContent = 'ETF Outstanding Units Dashboard';

  // Hide tab nav + panels
  document.querySelector('.tabs-nav').style.display = 'none';
  document.querySelectorAll('.tab-panel').forEach(p => p.remove());

  const cid = 'single_chart';
  const wrap = document.createElement('div');
  wrap.className = 'single-wrap';
  wrap.innerHTML = `
    <div class="section">
      <div class="section-title">${name}</div>
      <div class="controls">
        <div class="btn-group">
          ${TF_LABELS.map(tf => `<button class="tf-btn ${tf==='1Y'?'active':''}" onclick="updateSingle('${ticker}','${tf}',this)">${tf}</button>`).join('')}
        </div>
        <div class="divider"></div>
        <div class="btn-group">
          <button class="scale-btn active" onclick="updateSingleScale('${ticker}','rebase',this)">Rebase 100</button>
          <button class="scale-btn" onclick="updateSingleScale('${ticker}','units',this)">Units</button>
        </div>
        <div class="divider"></div>
        <div class="btn-group">
          <button class="scale-btn active" id="sma5" onclick="updateSingleMA('${ticker}','ma5',this)" style="color:#94a3b8">MA5</button>
          <button class="scale-btn active" id="sma10" onclick="updateSingleMA('${ticker}','ma10',this)" style="color:#facc15">MA10</button>
          <button class="scale-btn active" id="sma20" onclick="updateSingleMA('${ticker}','ma20',this)" style="color:#f87171">MA20</button>
        </div>
      </div>
      <div class="single-chart-wrap"><canvas id="${cid}"></canvas></div>
    </div>`;
  document.body.appendChild(wrap);

  const singleState = { tf: '1Y', scale: 'rebase', ma5: true, ma10: true, ma20: true };
  window._singleState = singleState;

  function redraw() {
    renderIndividualChart(ticker, cid, singleState.tf, singleState.scale, singleState.ma5, singleState.ma10, singleState.ma20);
  }

  window.updateSingle = (t, tf, btn) => {
    singleState.tf = tf;
    btn.closest('.btn-group').querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    redraw();
  };
  window.updateSingleScale = (t, scale, btn) => {
    singleState.scale = scale;
    btn.closest('.btn-group').querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    redraw();
  };
  window.updateSingleMA = (t, maKey, btn) => {
    singleState[maKey] = !singleState[maKey];
    btn.classList.toggle('active', singleState[maKey]);
    redraw();
  };

  requestAnimationFrame(redraw);
}

// Check for single-chart mode
const _singleTicker = new URLSearchParams(location.search).get('single');
if (_singleTicker && RAW.etfs[_singleTicker]) {
  renderSinglePage(_singleTicker);
} else {
  renderTab('commodity');
}
</script>
